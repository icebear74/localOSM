apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim
  namespace: osm
  labels:
    app: nominatim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nominatim
  template:
    metadata:
      labels:
        app: nominatim
    spec:
      containers:
        - name: nominatim
          image: mediagis/nominatim:4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PBF_URL
              value: ""
            - name: NOMINATIM_PASSWORD
              value: nominatim
            - name: PGHOST
              value: postgres.osm.svc.cluster.local
            - name: PGUSER
              value: osm
            - name: PGPASSWORD
              value: osm
            - name: PGDATABASE
              value: nominatim
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nominatim-data
              mountPath: /var/lib/postgresql/14/main
      volumes:
        - name: nominatim-data
          hostPath:
            path: /mnt/data/OSM/nominatim
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nominatim
  namespace: osm
spec:
  type: NodePort
  selector:
    app: nominatim
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
