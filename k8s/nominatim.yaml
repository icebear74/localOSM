apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim
  namespace: osm
  labels:
    app: nominatim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nominatim
  template:
    metadata:
      labels:
        app: nominatim
    spec:
      # fsGroup ensures the hostPath volume is owned by the postgres group (GID 100)
      # inside mediagis/nominatim:4.5, so PostgreSQL can read/write its data directory.
      securityContext:
        fsGroup: 100
      initContainers:
        # Wait until either the PBF file exists (first import) or the DB is already
        # initialized (subsequent starts). Prevents CrashLoopBackOff on an empty node.
        - name: wait-for-data
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              PBF=/import/planet.osm.pbf
              DB=/nominatim-db/PG_VERSION
              until [ -f "$PBF" ] || [ -f "$DB" ]; do
                echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') Waiting for PBF at $PBF or initialized DB at $DB ..."
                sleep 30
              done
              echo "Data ready — starting Nominatim."
          volumeMounts:
            - name: import-data
              mountPath: /import
              readOnly: true
            - name: nominatim-data
              mountPath: /nominatim-db
              readOnly: true
      containers:
        - name: nominatim
          image: mediagis/nominatim:4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PBF_PATH
              value: /nominatim/data/import/planet.osm.pbf
            - name: NOMINATIM_PASSWORD
              value: nominatim
            # Limit thread count to prevent OOM during import with large datasets.
            # Keep THREADS at 6 so the importer stays within the memory envelope
            # used by the larger OSM imports in this stack.
            - name: THREADS
              value: "6"
          ports:
            - containerPort: 8080
          resources:
            # Match requests to limits so the scheduler reserves the full import
            # footprint and the pod is less likely to be evicted mid-import.
            requests:
              memory: "12Gi"
              cpu: "6"
            limits:
              memory: "12Gi"
              cpu: "6"
          volumeMounts:
            # mediagis/nominatim:4.5 bundles PostgreSQL 16
            - name: nominatim-data
              mountPath: /var/lib/postgresql/16/main
            - name: import-data
              mountPath: /nominatim/data/import
      volumes:
        - name: nominatim-data
          hostPath:
            path: /mnt/data/OSM/nominatim
            type: DirectoryOrCreate
        - name: import-data
          hostPath:
            path: /mnt/data/OSM/import
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nominatim
  namespace: osm
spec:
  type: NodePort
  selector:
    app: nominatim
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
