apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim
  namespace: osm
  labels:
    app: nominatim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nominatim
  template:
    metadata:
      labels:
        app: nominatim
    spec:
      securityContext:
        fsGroup: 100
      initContainers:
        - name: wait-for-data
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              DB=/nominatim-db/PG_VERSION
              IMPORT_FINISHED=/nominatim-db/import-finished
              LAST_MISSING=""
              until [ -f "$DB" ] && [ -f "$IMPORT_FINISHED" ]; do
                MISSING=""
                [ -f "$DB" ] || MISSING="$MISSING $DB"
                [ -f "$IMPORT_FINISHED" ] || MISSING="$MISSING $IMPORT_FINISHED"
                if [ "$MISSING" != "$LAST_MISSING" ]; then
                  echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') Waiting for imported Nominatim database markers at $MISSING ..."
                  LAST_MISSING="$MISSING"
                fi
                sleep 30
              done
              echo "Database ready — starting Nominatim."
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          volumeMounts:
            - name: nominatim-data
              mountPath: /nominatim-db
              readOnly: true
      containers:
        - name: nominatim
          image: mediagis/nominatim:4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: NOMINATIM_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: osm-nominatim-import-config
                  key: import_password
            - name: THREADS
              valueFrom:
                configMapKeyRef:
                  name: osm-nominatim-import-config
                  key: import_threads
            # config.sh (invoked by the image's start.sh) unconditionally requires either
            # PBF_URL or PBF_PATH to be set, even though the actual import already ran via
            # nominatim-import-job.yaml and start.sh only uses this file when the
            # import-finished marker is missing. Without it the container crash-loops.
            - name: PBF_PATH
              value: /nominatim/data/import/planet.osm.pbf
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "8"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            # Nominatim may spend several minutes on cache warming before
            # serving HTTP, so startup must allow a long grace period.
            periodSeconds: 10
            failureThreshold: 90
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          volumeMounts:
            - name: nominatim-data
              mountPath: /var/lib/postgresql/16/main
      volumes:
        - name: nominatim-data
          hostPath:
            path: /mnt/data/OSM/nominatim/active
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nominatim
  namespace: osm
spec:
  type: NodePort
  selector:
    app: nominatim
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
