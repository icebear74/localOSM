apiVersion: batch/v1
kind: Job
metadata:
  name: valhalla-import
  namespace: osm
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: valhalla-import
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          env:
            # Build tiles from PBF, do not serve after building
            - name: serve_tiles
              value: "False"
            - name: force_rebuild
              value: "False"
            - name: build_admins
              value: "True"
            - name: build_time_zones
              value: "True"
            - name: build_tar
              value: "True"
          resources:
            requests:
              memory: "18Gi"
              cpu: "6"
            limits:
              memory: "18Gi"
              cpu: "6"
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      volumes:
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla
            type: DirectoryOrCreate
