apiVersion: batch/v1
kind: Job
metadata:
  name: valhalla-import
  namespace: osm
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: valhalla-import
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "=== Valhalla Import Job ==="
              echo "Looking for OSM PBF data at /data/import/planet.osm.pbf ..."
              if [ ! -f /data/import/planet.osm.pbf ]; then
                echo "ERROR: No OSM PBF file found at /data/import/planet.osm.pbf"
                exit 1
              fi
              PBF_SIZE=$(du -sh /data/import/planet.osm.pbf | cut -f1)
              echo "Found PBF file (${PBF_SIZE}). Building routing graph ..."
              mkdir -p /data/tiles
              cp /config/valhalla.json /tmp/valhalla.json
              valhalla_build_tiles -c /tmp/valhalla.json /data/import/planet.osm.pbf
              echo "=== Import complete. Routing graph stored at /data/tiles ==="
          volumeMounts:
            - name: import-data
              mountPath: /data/import
            - name: valhalla-data
              mountPath: /data
            - name: valhalla-config
              mountPath: /config
      volumes:
        - name: import-data
          hostPath:
            path: /mnt/data/OSM/import
            type: DirectoryOrCreate
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla
            type: DirectoryOrCreate
        - name: valhalla-config
          configMap:
            name: osm-valhalla-config
