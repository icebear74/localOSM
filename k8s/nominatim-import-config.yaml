# Tunables for the Nominatim import (k8s/nominatim-import-job.yaml) and the
# running Nominatim deployment (k8s/nominatim.yaml), both of which read
# NOMINATIM_PASSWORD/THREADS/NOMINATIM_OSM2PGSQL_CACHE from this ConfigMap.
# To change the number of osm2pgsql worker processes used for the (slow)
# initial import, edit import_threads (below) to match the CPU cores
# available to the nominatim-import Job. To change the osm2pgsql cache size
# (in MB) used during import, edit import_cache_mb to match the RAM
# available to the Job (osm2pgsql --cache, recommended up to ~75% of RAM).
# Re-apply this file (kubectl apply -f k8s/nominatim-import-config.yaml)
# before starting the next import.
apiVersion: v1
kind: ConfigMap
metadata:
  name: osm-nominatim-import-config
  namespace: osm
data:
  import_mode: import
  import_threads: "10"
  import_cache_mb: "12000"
  import_password: nominatim
