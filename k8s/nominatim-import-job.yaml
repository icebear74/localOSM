apiVersion: batch/v1
kind: Job
metadata:
  name: nominatim-import
  namespace: osm
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 100
      containers:
        - name: nominatim-import
          image: mediagis/nominatim:4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PBF_PATH
              value: /nominatim/data/import/planet.osm.pbf
            - name: NOMINATIM_PASSWORD
              value: nominatim
            - name: THREADS
              value: "4"
          resources:
            requests:
              memory: "12Gi"
              cpu: "4"
            limits:
              memory: "18Gi"
              cpu: "4"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              /app/config.sh
              if id nominatim >/dev/null 2>&1; then
                echo "user nominatim already exists"
              else
                useradd -m -p "${NOMINATIM_PASSWORD}" nominatim
              fi
              /app/init.sh
              touch /var/lib/postgresql/16/main/import-finished
          volumeMounts:
            - name: import-data
              mountPath: /nominatim/data/import
            - name: nominatim-data
              mountPath: /var/lib/postgresql/16/main
      volumes:
        - name: import-data
          hostPath:
            path: /mnt/data/OSMTemp/import
            type: DirectoryOrCreate
        - name: nominatim-data
          hostPath:
            path: /mnt/data/OSMTemp/nominatim/staging
            type: DirectoryOrCreate
