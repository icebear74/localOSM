apiVersion: v1
kind: ConfigMap
metadata:
  name: osm-web-app
  namespace: osm
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    import os
    import urllib.parse
    import urllib.request
    import urllib.error

    HOST = os.environ.get("WEB_HOST", "0.0.0.0")
    PORT = int(os.environ.get("WEB_PORT", "8080"))
    VALHALLA_URL = os.environ.get("VALHALLA_URL", "http://valhalla.osm.svc.cluster.local:8002")
    NOMINATIM_URL = os.environ.get("NOMINATIM_URL", "http://nominatim.osm.svc.cluster.local:8080")

    INDEX_HTML = """<!doctype html>
    <html lang="de">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>localOSM – Routing &amp; Karte</title>
      <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #2c7ab5; color: #fff; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 1rem; }
        #header h1 { font-size: 1.1rem; }
        #header a { color: #cde; font-size: 0.85rem; text-decoration: none; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 340px; min-width: 280px; background: #f8f9fa; border-right: 1px solid #ddd;
                   display: flex; flex-direction: column; overflow-y: auto; padding: 1rem; gap: 0.75rem; }
        #map { flex: 1; }
        label { font-size: 0.8rem; font-weight: 600; color: #444; display: block; margin-bottom: 2px; }
        input, select { width: 100%; padding: 0.45rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .btn { padding: 0.55rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600; width: 100%; }
        .btn-primary { background: #2c7ab5; color: #fff; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn:hover { filter: brightness(1.1); }
        #result-box { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 0.75rem; font-size: 0.82rem; }
        #result-box .ok { color: #1a7a1a; font-weight: 600; }
        #result-box .err { color: #c00; font-weight: 600; }
        .hint { font-size: 0.75rem; color: #888; }
        .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #777; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .geocode-row { display: flex; gap: 4px; }
        .geocode-row input { flex: 1; }
        .geocode-row button { white-space: nowrap; padding: 0 0.6rem; border: 1px solid #ccc; border-radius: 4px; background: #e9ecef; cursor: pointer; font-size: 0.8rem; }
      </style>
    </head>
    <body>
    <div id="header">
      <h1>&#127757; localOSM</h1>
      <a href="http://NODEIP:30083/" id="status-link">Status-Dashboard &rarr;</a>
    </div>
    <div id="main">
      <div id="sidebar">
        <div class="section-title">Start</div>
        <div>
          <label>Adresse suchen</label>
          <div class="geocode-row">
            <input id="startAddr" placeholder="z.B. Brandenburger Tor, Berlin">
            <button onclick="geocode('start')">&#128269;</button>
          </div>
        </div>
        <div class="row2">
          <div><label>Breitengrad</label><input id="startLat" value="52.5163" step="any"></div>
          <div><label>Längengrad</label><input id="startLon" value="13.3777" step="any"></div>
        </div>

        <div class="section-title">Ziel</div>
        <div>
          <label>Adresse suchen</label>
          <div class="geocode-row">
            <input id="endAddr" placeholder="z.B. Alexanderplatz, Berlin">
            <button onclick="geocode('end')">&#128269;</button>
          </div>
        </div>
        <div class="row2">
          <div><label>Breitengrad</label><input id="endLat" value="52.5219" step="any"></div>
          <div><label>Längengrad</label><input id="endLon" value="13.4132" step="any"></div>
        </div>

        <div class="section-title">Optionen</div>
        <div class="row2">
          <div>
            <label>Verkehrsmittel</label>
            <select id="costing">
              <option value="auto">Auto</option>
              <option value="pedestrian">Zu Fuß</option>
              <option value="bicycle">Fahrrad</option>
              <option value="truck">LKW</option>
            </select>
          </div>
          <div>
            <label>Einheiten</label>
            <select id="units">
              <option value="km">km</option>
              <option value="miles">Meilen</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="doRoute()">&#128205; Route berechnen</button>
        <button class="btn btn-secondary" onclick="doDistance()">&#8596; Nur Distanz</button>
        <p class="hint">Tipp: Klicke auf die Karte, um Start- (1. Klick) und Zielpunkt (2. Klick) zu setzen.</p>
        <div id="result-box">Noch keine Anfrage.</div>
      </div>
      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // Fix status link hostname
    document.getElementById('status-link').href =
      location.protocol + '//' + location.hostname + ':30083/';

    var map = L.map('map').setView([52.52, 13.405], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);

    var markers = { start: null, end: null };
    var routeLayer = null;
    var clickState = 0; // 0=start, 1=end

    var iconStart = L.divIcon({html:'<div style="background:#2c7ab5;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">S</div>', iconSize:[28,28], iconAnchor:[14,14], className:''});
    var iconEnd   = L.divIcon({html:'<div style="background:#c0392b;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">Z</div>', iconSize:[28,28], iconAnchor:[14,14], className:''});

    function setMarker(which, lat, lon) {
      var icon = which === 'start' ? iconStart : iconEnd;
      if (markers[which]) map.removeLayer(markers[which]);
      markers[which] = L.marker([lat, lon], {icon: icon}).addTo(map);
      document.getElementById(which + 'Lat').value = lat.toFixed(6);
      document.getElementById(which + 'Lon').value = lon.toFixed(6);
    }

    map.on('click', function(e) {
      if (clickState === 0) {
        setMarker('start', e.latlng.lat, e.latlng.lng);
        clickState = 1;
      } else {
        setMarker('end', e.latlng.lat, e.latlng.lng);
        clickState = 0;
        doRoute();
      }
    });

    // Valhalla uses 1e-6 precision polyline encoding
    function decodePolyline(encoded) {
      var coords = [], index = 0, lat = 0, lng = 0;
      while (index < encoded.length) {
        var b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lat += (result & 1) ? ~(result >> 1) : (result >> 1);
        shift = 0; result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lng += (result & 1) ? ~(result >> 1) : (result >> 1);
        coords.push([lat / 1e6, lng / 1e6]);
      }
      return coords;
    }

    function drawRoute(trip) {
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      var allCoords = [];
      (trip.legs || []).forEach(function(leg) {
        allCoords = allCoords.concat(decodePolyline(leg.shape || ''));
      });
      if (allCoords.length > 0) {
        routeLayer = L.polyline(allCoords, {color: '#2c7ab5', weight: 5, opacity: 0.8}).addTo(map);
        map.fitBounds(routeLayer.getBounds(), {padding: [30, 30]});
      }
    }

    function fmtDuration(secs) {
      if (secs < 60) return secs + ' s';
      var m = Math.floor(secs / 60), s = secs % 60;
      if (m < 60) return m + ' min ' + (s > 0 ? s + ' s' : '');
      var h = Math.floor(m / 60); m = m % 60;
      return h + ' h ' + (m > 0 ? m + ' min' : '');
    }

    function getPayload() {
      return {
        start: { lat: parseFloat(document.getElementById('startLat').value),
                 lon: parseFloat(document.getElementById('startLon').value) },
        end:   { lat: parseFloat(document.getElementById('endLat').value),
                 lon: parseFloat(document.getElementById('endLon').value) },
        costing: document.getElementById('costing').value,
        units:   document.getElementById('units').value
      };
    }

    async function doRoute() {
      var box = document.getElementById('result-box');
      box.innerHTML = '&#8987; Route wird berechnet ...';
      try {
        var resp = await fetch('/api/route', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(getPayload())
        });
        var data = await resp.json();
        if (data.error) {
          box.innerHTML = '<span class="err">Fehler: ' + data.error + '</span>';
          return;
        }
        var units = data.units || 'km';
        var dist = data.distance != null ? data.distance.toFixed(2) + ' ' + units : '?';
        var time = data.time_seconds != null ? fmtDuration(Math.round(data.time_seconds)) : '?';
        box.innerHTML = '<span class="ok">&#10003; Route gefunden</span><br>' +
          'Distanz: <b>' + dist + '</b><br>Fahrzeit: <b>' + time + '</b>';
        if (data.trip) drawRoute(data.trip);
        var s = getPayload().start, e = getPayload().end;
        setMarker('start', s.lat, s.lon);
        setMarker('end', e.lat, e.lon);
      } catch(err) {
        box.innerHTML = '<span class="err">Netzwerkfehler: ' + err + '</span>';
      }
    }

    async function doDistance() {
      var box = document.getElementById('result-box');
      box.innerHTML = '&#8987; Distanz wird berechnet ...';
      try {
        var resp = await fetch('/api/distance', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(getPayload())
        });
        var data = await resp.json();
        if (data.error) {
          box.innerHTML = '<span class="err">Fehler: ' + data.error + '</span>';
          return;
        }
        var units = document.getElementById('units').value;
        var dist = data.distance != null ? data.distance.toFixed(2) + ' ' + units : '?';
        var time = data.time_seconds != null ? fmtDuration(Math.round(data.time_seconds)) : '?';
        box.innerHTML = '<span class="ok">&#10003; Distanz ermittelt</span><br>' +
          'Distanz: <b>' + dist + '</b><br>Fahrzeit: <b>' + time + '</b>';
      } catch(err) {
        box.innerHTML = '<span class="err">Netzwerkfehler: ' + err + '</span>';
      }
    }

    async function geocode(which) {
      var addrInput = document.getElementById(which + 'Addr').value.trim();
      if (!addrInput) return;
      var box = document.getElementById('result-box');
      box.innerHTML = '&#128269; Suche: ' + addrInput + ' ...';
      try {
        var resp = await fetch('/api/geocode?q=' + encodeURIComponent(addrInput));
        var data = await resp.json();
        if (data.error) { box.innerHTML = '<span class="err">Geocoding-Fehler: ' + data.error + '</span>'; return; }
        var results = data.results || [];
        if (results.length === 0) { box.innerHTML = '<span class="err">Keine Treffer fuer: ' + addrInput + '</span>'; return; }
        var r = results[0];
        setMarker(which, parseFloat(r.lat), parseFloat(r.lon));
        map.setView([parseFloat(r.lat), parseFloat(r.lon)], 15);
        box.innerHTML = '<span class="ok">&#10003; ' + (which === 'start' ? 'Start' : 'Ziel') + ' gesetzt</span><br>' + (r.display_name || '');
      } catch(err) {
        box.innerHTML = '<span class="err">Geocoding-Fehler: ' + err + '</span>';
      }
    }
    </script>
    </body>
    </html>
    """

    class Handler(BaseHTTPRequestHandler):
        def _send_json(self, payload, status=200):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.send_header("Access-Control-Allow-Origin", "*")
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in {"/", "/index.html"}:
                body = INDEX_HTML.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            if self.path == "/healthz":
                self._send_json({"status": "ok"})
                return

            if self.path == "/api/status":
                self._send_json({"status": "ok", "valhalla": VALHALLA_URL, "nominatim": NOMINATIM_URL})
                return

            if self.path.startswith("/api/geocode"):
                query = self.path.split("?", 1)[1] if "?" in self.path else ""
                params = urllib.parse.parse_qs(query)
                q = params.get("q", [""])[0]
                if not q:
                    self._send_json({"error": "missing query parameter q"}, 400)
                    return
                try:
                    req = urllib.request.Request(
                        f"{NOMINATIM_URL}/search?q={urllib.parse.quote(q)}&format=jsonv2&limit=5",
                        headers={"User-Agent": "localosm-web/1.0"}
                    )
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    self._send_json({"results": data})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"error": str(exc)}, 502)
                return

            self._send_json({"error": "not found"}, 404)

        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(content_length) if content_length else b"{}"
            try:
                payload = json.loads(body.decode("utf-8"))
            except Exception:
                self._send_json({"error": "invalid json"}, 400)
                return

            if self.path == "/api/route":
                self._forward_route(payload)
                return

            if self.path == "/api/distance":
                self._forward_distance(payload)
                return

            self._send_json({"error": "not found"}, 404)

        def _build_valhalla_request(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            return {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": payload.get("costing", "auto"),
                "units": payload.get("units", "km"),
            }

        def _call_valhalla(self, endpoint, valhalla_payload):
            req = urllib.request.Request(
                f"{VALHALLA_URL}/{endpoint}",
                data=json.dumps(valhalla_payload).encode("utf-8"),
                headers={"Content-Type": "application/json", "User-Agent": "localosm-web/1.0"},
                method="POST",
            )
            with urllib.request.urlopen(req, timeout=15) as response:
                return json.loads(response.read().decode("utf-8"))

        def _forward_route(self, payload):
            try:
                data = self._call_valhalla("route", self._build_valhalla_request(payload))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "costing": payload.get("costing", "auto"),
                    "units": payload.get("units", "km"),
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "trip": data.get("trip"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def _forward_distance(self, payload):
            try:
                data = self._call_valhalla("route", self._build_valhalla_request(payload))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "units": payload.get("units", "km"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def log_message(self, format, *args):
            return

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"OSM web server listening on {HOST}:{PORT}")
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: osm
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config/app.py /tmp/app.py
              python /tmp/app.py
          env:
            - name: WEB_HOST
              value: "0.0.0.0"
            - name: WEB_PORT
              value: "8080"
            - name: VALHALLA_URL
              value: "http://valhalla.osm.svc.cluster.local:8002"
            - name: NOMINATIM_URL
              value: "http://nominatim.osm.svc.cluster.local:8080"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-code
              mountPath: /config
      volumes:
        - name: app-code
          configMap:
            name: osm-web-app
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: osm
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084

    INDEX_HTML = """
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>localOSM Routing</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
        .card { max-width: 860px; margin: 0 auto; padding: 1.5rem; border: 1px solid #ddd; border-radius: 10px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.75rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.55rem; }
        button { padding: 0.6rem 1rem; cursor: pointer; }
        pre { background: #f5f5f5; padding: 1rem; overflow: auto; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>localOSM Routing &amp; Distance</h1>
        <p>Enter coordinates and route between them. The frontend uses the local Valhalla service.</p>
        <div class="row">
          <div>
            <label>Start latitude</label>
            <input id="startLat" value="52.5200">
          </div>
          <div>
            <label>Start longitude</label>
            <input id="startLon" value="13.4050">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Destination latitude</label>
            <input id="endLat" value="52.5300">
          </div>
          <div>
            <label>Destination longitude</label>
            <input id="endLon" value="13.4150">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Costing</label>
            <input id="costing" value="auto">
          </div>
          <div>
            <label>Units</label>
            <input id="units" value="km">
          </div>
        </div>
        <button onclick="doRoute()">Calculate route</button>
        <button onclick="doDistance()">Calculate distance only</button>
        <h2>Result</h2>
        <pre id="result">Waiting for a request...</pre>
      </div>
      <script>
        async function doRoute() {
          const payload = {
            start: { lat: parseFloat(document.getElementById('startLat').value), lon: parseFloat(document.getElementById('startLon').value) },
            end: { lat: parseFloat(document.getElementById('endLat').value), lon: parseFloat(document.getElementById('endLon').value) },
            costing: document.getElementById('costing').value || 'auto',
            units: document.getElementById('units').value || 'km'
          };
          const result = document.getElementById('result');
          result.textContent = 'Requesting route...';
          try {
            const resp = await fetch('/api/route', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await resp.json();
            result.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            result.textContent = 'Error: ' + err;
          }
        }

        async function doDistance() {
          const payload = {
            start: { lat: parseFloat(document.getElementById('startLat').value), lon: parseFloat(document.getElementById('startLon').value) },
            end: { lat: parseFloat(document.getElementById('endLat').value), lon: parseFloat(document.getElementById('endLon').value) },
            costing: document.getElementById('costing').value || 'auto',
            units: document.getElementById('units').value || 'km'
          };
          const result = document.getElementById('result');
          result.textContent = 'Requesting distance...';
          try {
            const resp = await fetch('/api/distance', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await resp.json();
            result.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            result.textContent = 'Error: ' + err;
          }
        }
      </script>
    </body>
    </html>
    """

    class Handler(BaseHTTPRequestHandler):
        def _send_json(self, payload, status=200):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in {"/", "/index.html"}:
                body = INDEX_HTML.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            if self.path == "/api/status":
                self._send_json({"status": "ok", "valhalla": VALHALLA_URL, "nominatim": NOMINATIM_URL})
                return

            if self.path.startswith("/api/geocode"):
                query = self.path.split("?", 1)[1] if "?" in self.path else ""
                params = urllib.parse.parse_qs(query)
                q = params.get("q", [""])[0]
                if not q:
                    self._send_json({"error": "missing query"}, 400)
                    return
                try:
                    req = urllib.request.Request(f"{NOMINATIM_URL}/search?q={urllib.parse.quote(q)}&format=jsonv2&limit=1", headers={"User-Agent": "localosm-web"})
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    self._send_json({"results": data})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"error": str(exc)}, 502)
                return

            self._send_json({"error": "not found"}, 404)

        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(content_length) if content_length else b"{}"
            try:
                payload = json.loads(body.decode("utf-8"))
            except Exception:
                self._send_json({"error": "invalid json"}, 400)
                return

            if self.path == "/api/route":
                self._forward_route(payload)
                return

            if self.path == "/api/distance":
                self._forward_distance(payload)
                return

            self._send_json({"error": "not found"}, 404)

        def _forward_route(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            costing = payload.get("costing", "auto")
            units = payload.get("units", "km")
            request_payload = {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": costing,
                "units": units,
            }
            try:
                req = urllib.request.Request(
                    f"{VALHALLA_URL}/route",
                    data=json.dumps(request_payload).encode("utf-8"),
                    headers={"Content-Type": "application/json", "User-Agent": "localosm-web"},
                    method="POST",
                )
                with urllib.request.urlopen(req, timeout=10) as response:
                    data = json.loads(response.read().decode("utf-8"))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "costing": costing,
                    "units": units,
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "trip": data.get("trip"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def _forward_distance(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            costing = payload.get("costing", "auto")
            request_payload = {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": costing,
                "units": payload.get("units", "km"),
            }
            try:
                req = urllib.request.Request(
                    f"{VALHALLA_URL}/route",
                    data=json.dumps(request_payload).encode("utf-8"),
                    headers={"Content-Type": "application/json", "User-Agent": "localosm-web"},
                    method="POST",
                )
                with urllib.request.urlopen(req, timeout=10) as response:
                    data = json.loads(response.read().decode("utf-8"))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def log_message(self, format, *args):
            return

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"OSM web server listening on {HOST}:{PORT}")
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: osm
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config/app.py /tmp/app.py
              python /tmp/app.py
          env:
            - name: STATUS_HOST
              value: "0.0.0.0"
            - name: STATUS_PORT
              value: "8080"
            - name: VALHALLA_URL
              value: "http://valhalla.osm.svc.cluster.local:8002"
            - name: NOMINATIM_URL
              value: "http://nominatim.osm.svc.cluster.local:8080"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-code
              mountPath: /config
      volumes:
        - name: app-code
          configMap:
            name: osm-web-app
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: osm
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084
