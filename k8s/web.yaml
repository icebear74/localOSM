apiVersion: v1
kind: ConfigMap
metadata:
  name: osm-web-app
  namespace: osm
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import gzip
    import json
    import os
    import urllib.parse
    import urllib.request
    import urllib.error

    HOST = os.environ.get("WEB_HOST", "0.0.0.0")
    PORT = int(os.environ.get("WEB_PORT", "8080"))
    VALHALLA_URL = os.environ.get("VALHALLA_URL", "http://valhalla.osm.svc.cluster.local:8002")
    NOMINATIM_URL = os.environ.get("NOMINATIM_URL", "http://nominatim.osm.svc.cluster.local:8080")
    TILESERVER_URL = os.environ.get("TILESERVER_URL", "http://tileserver-gl.osm.svc.cluster.local")
    STATUS_URL = os.environ.get("STATUS_URL", "")

    INDEX_HTML = """<!doctype html>
    <html lang="de">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>localOSM – Routing &amp; Karte</title>
      <link rel="stylesheet" href="/static/maplibre-gl.css"/>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #2c7ab5; color: #fff; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 1rem; }
        #header h1 { font-size: 1.1rem; }
        #header a { color: #cde; font-size: 0.85rem; text-decoration: none; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #map-container { flex: 1; position: relative; display: flex; }
        #sidebar { width: 340px; min-width: 280px; background: #f8f9fa; border-right: 1px solid #ddd;
                   display: flex; flex-direction: column; overflow-y: auto; padding: 1rem; gap: 0.75rem; }
        #map { flex: 1; height: 100%; }
        label { font-size: 0.8rem; font-weight: 600; color: #444; display: block; margin-bottom: 2px; }
        label input[type="checkbox"] { display: inline; width: auto; margin-right: 0.5rem; }
        input, select { width: 100%; padding: 0.45rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .btn { padding: 0.55rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600; width: 100%; }
        .btn-primary { background: #2c7ab5; color: #fff; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn:hover { filter: brightness(1.1); }
        #result-box { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 0.75rem; font-size: 0.82rem; }
        #result-box .ok { color: #1a7a1a; font-weight: 600; }
        #result-box .err { color: #c00; font-weight: 600; }
        .hint { font-size: 0.75rem; color: #888; }
        .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #777; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .geocode-row { display: flex; gap: 4px; }
        .geocode-row input { flex: 1; }
        .geocode-row button { white-space: nowrap; padding: 0 0.6rem; border: 1px solid #ccc; border-radius: 4px; background: #e9ecef; cursor: pointer; font-size: 0.8rem; }
        #zoom-display { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; z-index: 10; pointer-events: none; }
      </style>
    </head>
    <body>
    <div id="header">
      <h1>&#127757; localOSM</h1>
      <a href="#" id="status-link" data-port="30083">Status-Dashboard &rarr;</a>
    </div>
    <div id="main">
      <div id="sidebar">
        <div class="section-title">Start</div>
        <div>
          <label>Adresse suchen</label>
          <div class="geocode-row">
            <input id="startAddr" placeholder="z.B. Brandenburger Tor, Berlin">
            <button onclick="geocode('start')">&#128269;</button>
          </div>
        </div>
        <div class="row2">
          <div><label>Breitengrad</label><input id="startLat" placeholder="wird per Klick/Suche gesetzt" step="any"></div>
          <div><label>Längengrad</label><input id="startLon" placeholder="wird per Klick/Suche gesetzt" step="any"></div>
        </div>

        <div class="section-title">Ziel</div>
        <div>
          <label>Adresse suchen</label>
          <div class="geocode-row">
            <input id="endAddr" placeholder="z.B. Alexanderplatz, Berlin">
            <button onclick="geocode('end')">&#128269;</button>
          </div>
        </div>
        <div class="row2">
          <div><label>Breitengrad</label><input id="endLat" placeholder="wird per Klick/Suche gesetzt" step="any"></div>
          <div><label>Längengrad</label><input id="endLon" placeholder="wird per Klick/Suche gesetzt" step="any"></div>
        </div>

        <div class="section-title">Optionen</div>
        <div class="row2">
          <div>
            <label>Verkehrsmittel</label>
            <select id="costing">
              <option value="auto">Auto</option>
              <option value="pedestrian">Zu Fuß</option>
              <option value="bicycle">Fahrrad</option>
              <option value="truck">LKW</option>
            </select>
          </div>
          <div>
            <label>Einheiten</label>
            <select id="units">
              <option value="km">km</option>
              <option value="miles">Meilen</option>
            </select>
          </div>
        </div>
        <div>
          <label><input type="checkbox" id="avoid_tolls"> Mautstraßen meiden</label>
        </div>
        <button class="btn btn-primary" onclick="doRoute()">&#128205; Route berechnen</button>
        <button class="btn btn-secondary" onclick="doDistance()">&#8596; Nur Distanz</button>
        <p class="hint">Tipp: Klicke auf die Karte, um Start- (1. Klick) und Zielpunkt (2. Klick) zu setzen.</p>
        <div id="result-box">Noch keine Anfrage.</div>
      </div>
      <div id="map-container" style="flex:1;position:relative;">
        <div id="map"></div>
        <div id="zoom-display">Zoom: 9</div>
      </div>
    </div>

    <script src="/static/maplibre-gl.js"></script>
    <script>
    // Fix service link hostnames
    function updateLinks() {
      var baseUrl = location.protocol + '//' + location.hostname;
      ['status-link'].forEach(function(id) {
        var a = document.getElementById(id);
        if (a && a.dataset.port) a.href = baseUrl + ':' + a.dataset.port + '/';
      });
    }
    updateLinks();

    var map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          openmaptiles: {
            type: 'vector',
            tiles: [location.protocol + '//' + location.host + '/tiles/{z}/{x}/{y}.pbf'],
            minzoom: 0,
            maxzoom: 16
          }
        },
        glyphs: location.protocol + '//' + location.host + '/fonts/{fontstack}/{range}.pbf',
        layers: [
          {id:'background',type:'background',paint:{'background-color':'#f2efe9'}},
          {id:'landcover-wood',type:'fill',source:'openmaptiles','source-layer':'landcover',filter:['in','class','wood','forest'],paint:{'fill-color':'#d0e8c0','fill-opacity':0.6}},
          {id:'landcover-grass',type:'fill',source:'openmaptiles','source-layer':'landcover',filter:['in','class','grass','farmland','agriculture'],paint:{'fill-color':'#e8f0d0','fill-opacity':0.5}},
          {id:'landuse-residential',type:'fill',source:'openmaptiles','source-layer':'landuse',filter:['in','class','residential','commercial','industrial'],paint:{'fill-color':'#e8e0d8','fill-opacity':0.5}},
          {id:'landuse-green',type:'fill',source:'openmaptiles','source-layer':'landuse',filter:['in','class','grass','park','meadow','forest','wood','cemetery'],paint:{'fill-color':'#d0e8c0'}},
          {id:'water',type:'fill',source:'openmaptiles','source-layer':'water',paint:{'fill-color':'#9cc0d4'}},
          {id:'waterway',type:'line',source:'openmaptiles','source-layer':'waterway',paint:{'line-color':'#9cc0d4','line-width':1}},
          {id:'boundary-country',type:'line',source:'openmaptiles','source-layer':'boundary',filter:['==','admin_level',2],paint:{'line-color':'#9e9cab','line-width':['interpolate',['linear'],['zoom'],2,0.5,6,1.5,10,2]}},
          {id:'boundary-state',type:'line',source:'openmaptiles','source-layer':'boundary',filter:['==','admin_level',4],minzoom:4,paint:{'line-color':'#b0adb8','line-width':0.8,'line-dasharray':[3,2]}},
          {id:'road',type:'line',source:'openmaptiles','source-layer':'transportation',filter:['in','class','minor','service','track','path'],minzoom:12,paint:{'line-color':'#d4cfc8','line-width':['interpolate',['linear'],['zoom'],12,0.5,14,1,16,3]}},
          {id:'road-secondary',type:'line',source:'openmaptiles','source-layer':'transportation',filter:['in','class','secondary','tertiary'],minzoom:9,paint:{'line-color':'#c8c3ba','line-width':['interpolate',['linear'],['zoom'],9,0.5,12,1.5,14,3,16,5]}},
          {id:'road-primary',type:'line',source:'openmaptiles','source-layer':'transportation',filter:['==','class','primary'],minzoom:7,paint:{'line-color':'#fcd354','line-width':['interpolate',['linear'],['zoom'],7,0.5,10,2,14,5,16,8]}},
          {id:'road-major',type:'line',source:'openmaptiles','source-layer':'transportation',filter:['in','class','motorway','trunk'],paint:{'line-color':'#f9a825','line-width':['interpolate',['linear'],['zoom'],6,1,10,3,14,7,16,12]}},
          {id:'building',type:'fill',source:'openmaptiles','source-layer':'building',minzoom:14,paint:{'fill-color':'#d9d0c9','fill-opacity':0.9}},
          {id:'water-name',type:'symbol',source:'openmaptiles','source-layer':'water_name',layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],4,10,10,14],'symbol-placement':'point'},paint:{'text-color':'#5b8db8','text-halo-color':'#fff','text-halo-width':1}},
          {id:'road-label-minor',type:'symbol',source:'openmaptiles','source-layer':'transportation_name',filter:['in','class','minor','service','track'],minzoom:15,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'symbol-placement':'line','text-size':10,'text-max-angle':30,'text-padding':5},paint:{'text-color':'#555','text-halo-color':'#fff','text-halo-width':1.5}},
          {id:'road-label-secondary',type:'symbol',source:'openmaptiles','source-layer':'transportation_name',filter:['in','class','secondary','tertiary'],minzoom:13,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'symbol-placement':'line','text-size':11,'text-max-angle':30},paint:{'text-color':'#555','text-halo-color':'#fff','text-halo-width':1.5}},
          {id:'road-label-primary',type:'symbol',source:'openmaptiles','source-layer':'transportation_name',filter:['in','class','primary','trunk','motorway'],minzoom:10,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'symbol-placement':'line','text-size':12,'text-max-angle':30},paint:{'text-color':'#333','text-halo-color':'#fff','text-halo-width':1.5}},
          {id:'place-country',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['==','class','country'],layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],2,10,6,16,8,18]},paint:{'text-color':'#333','text-halo-color':'rgba(255,255,255,0.8)','text-halo-width':2}},
          {id:'place-state',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['==','class','state'],minzoom:5,maxzoom:12,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],5,10,10,14]},paint:{'text-color':'#555','text-halo-color':'rgba(255,255,255,0.8)','text-halo-width':1.5}},
          {id:'place-city',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['in','class','city'],layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],6,11,10,15,14,18]},paint:{'text-color':'#222','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':2}},
          {id:'place-town',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['==','class','town'],minzoom:8,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],8,10,12,14,16,17]},paint:{'text-color':'#333','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5}},
          {id:'place-village',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['==','class','village'],minzoom:10,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':['interpolate',['linear'],['zoom'],10,10,14,13]},paint:{'text-color':'#444','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5}},
          {id:'place-suburb',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['in','class','suburb','quarter','neighbourhood'],minzoom:12,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':11},paint:{'text-color':'#555','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5}},
          {id:'place-hamlet',type:'symbol',source:'openmaptiles','source-layer':'place',filter:['in','class','hamlet','isolated_dwelling'],minzoom:13,layout:{'text-field':['coalesce',['get','name:de'],['get','name:en'],['get','name']],'text-font':['NotoSansRegular'],'text-size':10},paint:{'text-color':'#666','text-halo-color':'rgba(255,255,255,0.9)','text-halo-width':1.5}}
        ]
      },
      center: [10, 50],
      zoom: 2,
      attributionControl: true
    });

    // Firefox sometimes computes a 0-size WebGL canvas when the map is created
    // inside a flexbox layout before the surrounding layout has settled, leaving
    // a blank map until the window is manually resized (Chromium/Edge are more
    // forgiving here). Force a resize once the container has its final size,
    // and keep the map in sync with later container size changes.
    if (window.ResizeObserver) {
      new ResizeObserver(function() { map.resize(); }).observe(document.getElementById('map-container'));
    }
    window.addEventListener('resize', function() { map.resize(); });

    // The map is interactive (pan/zoom/click) from the moment it is created,
    // even before any address has been searched -- users can already explore
    // the imported area and click to set start/end points.
    map.on('load', function() {
      map.resize();
      fitToDataBounds();
    });

    // Zoom/center on the actual extent of the imported map data instead of a
    // hardcoded location, so e.g. an import that only contains Luxembourg
    // opens centered on Luxembourg rather than on an unrelated default.
    async function fitToDataBounds() {
      try {
        var resp = await fetch('/api/bounds');
        var data = await resp.json();
        var b = data.bounds;
        if (Array.isArray(b) && b.length === 4 && b.every(function(v) { return typeof v === 'number' && isFinite(v); })) {
          map.fitBounds([[b[0], b[1]], [b[2], b[3]]], {padding: 40, animate: false});
        }
      } catch (e) { /* keep the default world view if bounds are unavailable */ }
    }

    var markers = { start: null, end: null };
    var clickState = 0; // 0=start, 1=end

    function setMarker(which, lat, lon) {
      var bg = which === 'start' ? '#2c7ab5' : '#c0392b';
      var label = which === 'start' ? 'S' : 'Z';
      var el = document.createElement('div');
      el.style.cssText = 'background:' + bg + ';color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)';
      el.textContent = label;
      if (markers[which]) markers[which].remove();
      markers[which] = new maplibregl.Marker({element: el, anchor: 'center'})
        .setLngLat([lon, lat])
        .addTo(map);
      document.getElementById(which + 'Lat').value = lat.toFixed(6);
      document.getElementById(which + 'Lon').value = lon.toFixed(6);
    }

    map.on('click', function(e) {
      var lat = e.lngLat.lat, lon = e.lngLat.lng;
      if (clickState === 0) {
        setMarker('start', lat, lon);
        reverseGeocode('start', lat, lon);
        clickState = 1;
      } else {
        setMarker('end', lat, lon);
        reverseGeocode('end', lat, lon);
        clickState = 0;
        doRoute();
      }
    });

    // Update zoom level display
    function updateZoomDisplay() {
      var zoomLevel = Math.round(map.getZoom() * 10) / 10;
      document.getElementById('zoom-display').textContent = 'Zoom: ' + zoomLevel.toFixed(1);
    }
    map.on('zoom', updateZoomDisplay);
    map.on('move', updateZoomDisplay);
    updateZoomDisplay(); // Initialize on load

    // Reverse geocode a coordinate and populate the address input
    async function reverseGeocode(which, lat, lon) {
      try {
        var resp = await fetch('/api/reverse?lat=' + lat + '&lon=' + lon);
        var data = await resp.json();
        if (!data.error && data.display_name) {
          document.getElementById(which + 'Addr').value = data.display_name;
        }
      } catch(e) { /* silently ignore */ }
    }

    // Valhalla uses 1e-6 precision polyline encoding
    function decodePolyline(encoded) {
      var coords = [], index = 0, lat = 0, lng = 0;
      while (index < encoded.length) {
        var b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lat += (result & 1) ? ~(result >> 1) : (result >> 1);
        shift = 0; result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lng += (result & 1) ? ~(result >> 1) : (result >> 1);
        coords.push([lat / 1e6, lng / 1e6]);
      }
      return coords;
    }

    function drawRoute(trip) {
      var allCoords = [];
      (trip.legs || []).forEach(function(leg) {
        decodePolyline(leg.shape || '').forEach(function(c) {
          allCoords.push([c[1], c[0]]); // MapLibre GL uses [lng, lat]
        });
      });
      if (allCoords.length === 0) return;
      var geojson = {type:'Feature',geometry:{type:'LineString',coordinates:allCoords}};
      if (map.getSource('route')) {
        map.getSource('route').setData(geojson);
      } else {
        map.addSource('route', {type:'geojson', data: geojson});
        map.addLayer({id:'route-line',type:'line',source:'route',
          paint:{'line-color':'#2c7ab5','line-width':5,'line-opacity':0.8}});
      }
      var bounds = allCoords.reduce(function(b, c) { return b.extend(c); },
        new maplibregl.LngLatBounds(allCoords[0], allCoords[0]));
      map.fitBounds(bounds, {padding: 30});
    }

    function fmtDuration(secs) {
      if (secs < 60) return secs + ' s';
      var m = Math.floor(secs / 60), s = secs % 60;
      if (m < 60) return m + ' min ' + (s > 0 ? s + ' s' : '');
      var h = Math.floor(m / 60); m = m % 60;
      return h + ' h ' + (m > 0 ? m + ' min' : '');
    }

    function getPayload() {
      return {
        start: { lat: parseFloat(document.getElementById('startLat').value),
                 lon: parseFloat(document.getElementById('startLon').value) },
        end:   { lat: parseFloat(document.getElementById('endLat').value),
                 lon: parseFloat(document.getElementById('endLon').value) },
        costing: document.getElementById('costing').value,
        units:   document.getElementById('units').value,
        avoid_tolls: document.getElementById('avoid_tolls').checked
      };
    }

    function hasValidPoints(payload) {
      return isFinite(payload.start.lat) && isFinite(payload.start.lon) &&
             isFinite(payload.end.lat) && isFinite(payload.end.lon);
    }

    async function doRoute() {
      var box = document.getElementById('result-box');
      var payload = getPayload();
      if (!hasValidPoints(payload)) {
        box.innerHTML = '<span class="err">Bitte Start und Ziel setzen (Adresse suchen oder auf die Karte klicken).</span>';
        return;
      }
      box.innerHTML = '&#8987; Route wird berechnet ...';
      try {
        var resp = await fetch('/api/route', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        var data = await resp.json();
        if (data.error) {
          box.innerHTML = '<span class="err">Fehler: ' + data.error + '</span>';
          return;
        }
        var units = data.units || 'km';
        var dist = data.distance != null ? data.distance.toFixed(2) + ' ' + units : '?';
        var time = data.time_seconds != null ? fmtDuration(Math.round(data.time_seconds)) : '?';
        box.innerHTML = '<span class="ok">&#10003; Route gefunden</span><br>' +
          'Distanz: <b>' + dist + '</b><br>Fahrzeit: <b>' + time + '</b>';
        if (data.trip) drawRoute(data.trip);
        setMarker('start', payload.start.lat, payload.start.lon);
        setMarker('end', payload.end.lat, payload.end.lon);
      } catch(err) {
        box.innerHTML = '<span class="err">Netzwerkfehler: ' + err + '</span>';
      }
    }

    async function doDistance() {
      var box = document.getElementById('result-box');
      var payload = getPayload();
      if (!hasValidPoints(payload)) {
        box.innerHTML = '<span class="err">Bitte Start und Ziel setzen (Adresse suchen oder auf die Karte klicken).</span>';
        return;
      }
      box.innerHTML = '&#8987; Distanz wird berechnet ...';
      try {
        var resp = await fetch('/api/distance', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        var data = await resp.json();
        if (data.error) {
          box.innerHTML = '<span class="err">Fehler: ' + data.error + '</span>';
          return;
        }
        var units = document.getElementById('units').value;
        var dist = data.distance != null ? data.distance.toFixed(2) + ' ' + units : '?';
        var time = data.time_seconds != null ? fmtDuration(Math.round(data.time_seconds)) : '?';
        box.innerHTML = '<span class="ok">&#10003; Distanz ermittelt</span><br>' +
          'Distanz: <b>' + dist + '</b><br>Fahrzeit: <b>' + time + '</b>';
      } catch(err) {
        box.innerHTML = '<span class="err">Netzwerkfehler: ' + err + '</span>';
      }
    }

    async function geocode(which) {
      var addrInput = document.getElementById(which + 'Addr').value.trim();
      if (!addrInput) return;
      var box = document.getElementById('result-box');
      box.innerHTML = '&#128269; Suche: ' + addrInput + ' ...';
      try {
        var resp = await fetch('/api/geocode?q=' + encodeURIComponent(addrInput));
        var data = await resp.json();
        if (data.error) { box.innerHTML = '<span class="err">Geocoding-Fehler: ' + data.error + '</span>'; return; }
        var results = data.results || [];
        if (results.length === 0) { box.innerHTML = '<span class="err">Keine Treffer fuer: ' + addrInput + '</span>'; return; }
        var r = results[0];
        setMarker(which, parseFloat(r.lat), parseFloat(r.lon));
        map.flyTo({center: [parseFloat(r.lon), parseFloat(r.lat)], zoom: 15});
        box.innerHTML = '<span class="ok">&#10003; ' + (which === 'start' ? 'Start' : 'Ziel') + ' gesetzt</span><br>' + (r.display_name || '');
      } catch(err) {
        box.innerHTML = '<span class="err">Geocoding-Fehler: ' + err + '</span>';
      }
    }
    </script>
    </body>
    </html>
    """

    class Handler(BaseHTTPRequestHandler):
        def _send_json(self, payload, status=200):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.send_header("Access-Control-Allow-Origin", "*")
            self.end_headers()
            self.wfile.write(body)

        @staticmethod
        def _friendly_error(exc, service_name):
            msg = str(exc)
            if "111" in msg or "Connection refused" in msg or "ConnectionRefused" in msg:
                return (
                    f"{service_name} ist noch nicht erreichbar (startet noch oder importiert Daten). "
                    "Bitte warten und den Status im Dashboard prüfen."
                )
            if "timed out" in msg.lower() or "timeout" in msg.lower():
                return (
                    f"{service_name} antwortet nicht (Timeout). "
                    "Möglicherweise läuft noch ein Daten-Import."
                )
            return msg

        def do_GET(self):
            if self.path in {"/", "/index.html"}:
                html = INDEX_HTML
                if STATUS_URL:
                    html = html.replace("http://NODEIP:30083/", STATUS_URL.rstrip("/") + "/")
                body = html.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            if self.path == "/favicon.ico":
                # Return a minimal favicon (or 404, browsers don't care much)
                self.send_response(404)
                self.end_headers()
                return

            if self.path == "/healthz":
                self._send_json({"status": "ok"})
                return

            if self.path.startswith("/fonts/"):
                # Proxy MapLibre GL glyph PBF requests to TileServer-GL.
                # TileServer-GL generates PBF files from TTF/OTF sources on demand.
                # This avoids cross-origin requests to TileServer-GL (port 30085).
                font_url = TILESERVER_URL + "/fonts" + self.path[len("/fonts"):]
                try:
                    req = urllib.request.Request(font_url, headers={
                        "User-Agent": "localosm-web/1.0",
                        "Accept-Encoding": "gzip"
                    })
                    with urllib.request.urlopen(req, timeout=10) as response:
                        http_status = response.status
                        body = response.read()
                        content_type = response.headers.get("Content-Type", "application/x-protobuf")
                        content_encoding = response.headers.get("Content-Encoding", "").lower()
                    
                    # Handle gzip decompression (same as tile proxy).
                    is_gzip_header = content_encoding == "gzip"
                    is_gzip_magic = len(body) >= 2 and body[0:2] == b'\x1f\x8b'
                    
                    if is_gzip_header or is_gzip_magic:
                        try:
                            body = gzip.decompress(body)
                        except Exception:
                            pass  # Not valid gzip; send as-is
                    
                    self.send_response(http_status)
                    self.send_header("Content-Type", content_type)
                    self.send_header("Content-Length", str(len(body)))
                    self.send_header("Access-Control-Allow-Origin", "*")
                    self.end_headers()
                    self.wfile.write(body)
                except urllib.error.HTTPError as e:
                    self.send_response(e.code)
                    self.end_headers()
                except Exception:
                    self.send_response(502)
                    self.end_headers()
                return

            if self.path.startswith("/tiles/"):
                # Proxy vector tile requests to TileServer-GL via the internal K8s service.
                # This serves tiles from the same origin as the web page, avoiding CORS issues.
                z_x_y = self.path[len("/tiles"):]  # e.g. /14/8845/6436.pbf
                tile_url = TILESERVER_URL + "/data/v3" + z_x_y
                try:
                    # Request gzip encoding to reduce network transfer; will conditionally decompress here
                    # based on Content-Encoding header and gzip magic bytes detection.
                    req = urllib.request.Request(tile_url, headers={
                        "User-Agent": "localosm-web/1.0",
                        "Accept-Encoding": "gzip"
                    })
                    with urllib.request.urlopen(req, timeout=10) as response:
                        http_status = response.status
                        body = response.read()
                        content_type = response.headers.get("Content-Type", "application/x-protobuf")
                        content_encoding = response.headers.get("Content-Encoding", "").lower()
                    
                    # Handle gzip decompression. Check both Content-Encoding header and gzip magic bytes.
                    # TileServer-GL may omit the header but still send gzip data.
                    is_gzip_header = content_encoding == "gzip"
                    is_gzip_magic = len(body) >= 2 and body[0:2] == b'\x1f\x8b'
                    
                    if is_gzip_header or is_gzip_magic:
                        try:
                            body = gzip.decompress(body)
                            if is_gzip_magic and not is_gzip_header:
                                print(f"debug: Detected gzip by magic bytes (no Content-Encoding header) for {tile_url}", flush=True)
                        except (gzip.BadGzipFile, OSError) as e:
                            print(f"error: Gzip decompression failed (body size {len(body)}, header={is_gzip_header}, magic={is_gzip_magic}): {e}", flush=True)
                            # Log additional context when header indicated gzip but decompression failed
                            if is_gzip_header:
                                print(f"error: Content-Encoding header claimed gzip but decompression failed for {tile_url}", flush=True)
                            else:
                                print(f"warning: Malformed gzip data detected for {tile_url}, forwarding as-is", flush=True)
                    
                    if len(body) == 0:
                        print(f"debug: Empty tile response (status={http_status}) from {tile_url}", flush=True)
                    
                    # Forward the upstream HTTP status code (e.g., 204 No Content) instead of always 200.
                    # This allows clients to handle empty/non-existent tiles correctly.
                    try:
                        self.send_response(http_status)
                        self.send_header("Content-Type", content_type)
                        self.send_header("Content-Length", str(len(body)))
                        self.send_header("Cache-Control", "max-age=86400")
                        self.end_headers()
                        if len(body) > 0:
                            self.wfile.write(body)
                    except BrokenPipeError:
                        print(f"debug: Client disconnected while sending tile {z_x_y}", flush=True)
                except urllib.error.HTTPError as e:
                    try:
                        self.send_response(e.code)
                        self.send_header("Content-Length", "0")
                        self.end_headers()
                    except BrokenPipeError:
                        print(f"debug: Client disconnected during error response for {tile_url}", flush=True)
                except Exception as exc:
                    error_msg = f"Tile proxy error: {type(exc).__name__}: {str(exc)}"
                    print(error_msg, flush=True)
                    try:
                        self.send_response(502)
                        self.send_header("Content-Length", "0")
                        self.end_headers()
                    except BrokenPipeError:
                        print(f"debug: Client disconnected during error response for {tile_url}", flush=True)
                return

            if self.path.startswith("/static/"):
                filename = self.path[len("/static/"):]
                allowed = {"maplibre-gl.js": "application/javascript", "maplibre-gl.css": "text/css"}
                if filename not in allowed:
                    self.send_response(404)
                    self.end_headers()
                    return
                filepath = os.path.join("/data/static", filename)
                try:
                    with open(filepath, "rb") as f:
                        body = f.read()
                    self.send_response(200)
                    self.send_header("Content-Type", allowed[filename])
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                except FileNotFoundError:
                    self.send_response(503)
                    self.end_headers()
                return

            if self.path == "/api/status":
                self._send_json({"status": "ok", "valhalla": VALHALLA_URL, "nominatim": NOMINATIM_URL})
                return

            if self.path == "/api/bounds":
                # Report the actual extent of the imported map data (from TileServer-GL's
                # TileJSON) so the client can zoom/center on the real data instead of a
                # hardcoded location that may not match what was imported (e.g. Luxembourg).
                try:
                    req = urllib.request.Request(
                        f"{TILESERVER_URL}/data/v3.json",
                        headers={"User-Agent": "localosm-web/1.0"}
                    )
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    bounds = data.get("bounds")
                    if not (isinstance(bounds, list) and len(bounds) == 4):
                        self._send_json({"bounds": None})
                        return
                    self._send_json({"bounds": bounds})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"bounds": None, "error": self._friendly_error(exc, "TileServer GL")})
                return

            if self.path.startswith("/api/geocode"):
                query = self.path.split("?", 1)[1] if "?" in self.path else ""
                params = urllib.parse.parse_qs(query)
                q = params.get("q", [""])[0]
                if not q:
                    self._send_json({"error": "missing query parameter q"}, 400)
                    return
                try:
                    req = urllib.request.Request(
                        f"{NOMINATIM_URL}/search?q={urllib.parse.quote(q)}&format=jsonv2&limit=1",
                        headers={"User-Agent": "localosm-web/1.0"}
                    )
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    self._send_json({"results": data})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"error": self._friendly_error(exc, "Nominatim (Geocoding)")}, 502)
                return

            if self.path.startswith("/api/reverse"):
                query = self.path.split("?", 1)[1] if "?" in self.path else ""
                params = urllib.parse.parse_qs(query)
                lat = params.get("lat", [""])[0]
                lon = params.get("lon", [""])[0]
                if not lat or not lon:
                    self._send_json({"error": "missing lat/lon parameters"}, 400)
                    return
                try:
                    req = urllib.request.Request(
                        f"{NOMINATIM_URL}/reverse?lat={urllib.parse.quote(lat)}&lon={urllib.parse.quote(lon)}&format=jsonv2",
                        headers={"User-Agent": "localosm-web/1.0"}
                    )
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    self._send_json({"display_name": data.get("display_name", "")})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"error": self._friendly_error(exc, "Nominatim (Reverse Geocoding)")}, 502)
                return

            self._send_json({"error": "not found"}, 404)

        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(content_length) if content_length else b"{}"
            try:
                payload = json.loads(body.decode("utf-8"))
            except Exception:
                self._send_json({"error": "invalid json"}, 400)
                return

            if self.path == "/api/route":
                self._forward_route(payload)
                return

            if self.path == "/api/distance":
                self._forward_distance(payload)
                return

            self._send_json({"error": "not found"}, 404)

        def _build_valhalla_request(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            costing = payload.get("costing", "auto")
            avoid_tolls = payload.get("avoid_tolls", False)
            
            # Build the base request
            request = {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": costing,
                "units": payload.get("units", "km"),
            }
            
            # Add costing options for toll avoidance (only for auto and truck)
            # Note: In Valhalla, use_tolls: False means avoid tolls
            if avoid_tolls and costing in ("auto", "truck"):
                if "costing_options" not in request:
                    request["costing_options"] = {}
                if costing not in request["costing_options"]:
                    request["costing_options"][costing] = {}
                request["costing_options"][costing]["use_tolls"] = False
            
            return request

        def _call_valhalla(self, endpoint, valhalla_payload):
            req = urllib.request.Request(
                f"{VALHALLA_URL}/{endpoint}",
                data=json.dumps(valhalla_payload).encode("utf-8"),
                headers={"Content-Type": "application/json", "User-Agent": "localosm-web/1.0"},
                method="POST",
            )
            with urllib.request.urlopen(req, timeout=15) as response:
                return json.loads(response.read().decode("utf-8"))

        def _forward_route(self, payload):
            try:
                data = self._call_valhalla("route", self._build_valhalla_request(payload))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "costing": payload.get("costing", "auto"),
                    "units": payload.get("units", "km"),
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "trip": data.get("trip"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": self._friendly_error(exc, "Valhalla (Routing)")}, 502)

        def _forward_distance(self, payload):
            try:
                data = self._call_valhalla("route", self._build_valhalla_request(payload))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "units": payload.get("units", "km"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": self._friendly_error(exc, "Valhalla (Routing)")}, 502)

        def log_message(self, format, *args):
            return

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"OSM web server listening on {HOST}:{PORT}")
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: osm
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: fetch-static
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              MLGL_VERSION="4.7.1"
              mkdir -p /data/static
              if [ ! -f /data/static/maplibre-gl.js ]; then
                echo "Downloading maplibre-gl.js v${MLGL_VERSION} (one-time setup)..."
                wget -q -O /data/static/maplibre-gl.js \
                  "https://unpkg.com/maplibre-gl@${MLGL_VERSION}/dist/maplibre-gl.js" \
                  || { rm -f /data/static/maplibre-gl.js; echo "ERROR: maplibre-gl.js download failed"; exit 1; }
              fi
              if [ ! -f /data/static/maplibre-gl.css ]; then
                echo "Downloading maplibre-gl.css v${MLGL_VERSION} (one-time setup)..."
                wget -q -O /data/static/maplibre-gl.css \
                  "https://unpkg.com/maplibre-gl@${MLGL_VERSION}/dist/maplibre-gl.css" \
                  || { rm -f /data/static/maplibre-gl.css; echo "ERROR: maplibre-gl.css download failed"; exit 1; }
              fi
              echo "Static assets ready."
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: web-static
              mountPath: /data/static
      containers:
        - name: web
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config/app.py /tmp/app.py
              python /tmp/app.py
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: WEB_HOST
              value: "0.0.0.0"
            - name: WEB_PORT
              value: "8080"
            - name: VALHALLA_URL
              value: "http://valhalla.osm.svc.cluster.local:8002"
            - name: NOMINATIM_URL
              value: "http://nominatim.osm.svc.cluster.local:8080"
            - name: TILESERVER_URL
              value: "http://tileserver-gl.osm.svc.cluster.local"
            - name: STATUS_URL
              value: ""
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-code
              mountPath: /config
            - name: web-static
              mountPath: /data/static
      volumes:
        - name: app-code
          configMap:
            name: osm-web-app
        - name: web-static
          hostPath:
            path: /mnt/data/OSM/web-static
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: osm
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084
