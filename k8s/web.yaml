apiVersion: v1
kind: ConfigMap
metadata:
  name: osm-web-app
  namespace: osm
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    import os
    import urllib.request
    import urllib.error

    HOST = os.environ.get("STATUS_HOST", "0.0.0.0")
    PORT = int(os.environ.get("STATUS_PORT", "8080"))
    VALHALLA_URL = os.environ.get("VALHALLA_URL", "http://valhalla.osm.svc.cluster.local:8002")
    NOMINATIM_URL = os.environ.get("NOMINATIM_URL", "http://nominatim.osm.svc.cluster.local:8080")

    INDEX_HTML = """
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>localOSM Routing</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
        .card { max-width: 860px; margin: 0 auto; padding: 1.5rem; border: 1px solid #ddd; border-radius: 10px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.75rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.55rem; }
        button { padding: 0.6rem 1rem; cursor: pointer; }
        pre { background: #f5f5f5; padding: 1rem; overflow: auto; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>localOSM Routing &amp; Distance</h1>
        <p>Enter coordinates and route between them. The frontend uses the local Valhalla service.</p>
        <div class="row">
          <div>
            <label>Start latitude</label>
            <input id="startLat" value="52.5200">
          </div>
          <div>
            <label>Start longitude</label>
            <input id="startLon" value="13.4050">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Destination latitude</label>
            <input id="endLat" value="52.5300">
          </div>
          <div>
            <label>Destination longitude</label>
            <input id="endLon" value="13.4150">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Costing</label>
            <input id="costing" value="auto">
          </div>
          <div>
            <label>Units</label>
            <input id="units" value="km">
          </div>
        </div>
        <button onclick="doRoute()">Calculate route</button>
        <button onclick="doDistance()">Calculate distance only</button>
        <h2>Result</h2>
        <pre id="result">Waiting for a request...</pre>
      </div>
      <script>
        async function doRoute() {
          const payload = {
            start: { lat: parseFloat(document.getElementById('startLat').value), lon: parseFloat(document.getElementById('startLon').value) },
            end: { lat: parseFloat(document.getElementById('endLat').value), lon: parseFloat(document.getElementById('endLon').value) },
            costing: document.getElementById('costing').value || 'auto',
            units: document.getElementById('units').value || 'km'
          };
          const result = document.getElementById('result');
          result.textContent = 'Requesting route...';
          try {
            const resp = await fetch('/api/route', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await resp.json();
            result.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            result.textContent = 'Error: ' + err;
          }
        }

        async function doDistance() {
          const payload = {
            start: { lat: parseFloat(document.getElementById('startLat').value), lon: parseFloat(document.getElementById('startLon').value) },
            end: { lat: parseFloat(document.getElementById('endLat').value), lon: parseFloat(document.getElementById('endLon').value) },
            costing: document.getElementById('costing').value || 'auto',
            units: document.getElementById('units').value || 'km'
          };
          const result = document.getElementById('result');
          result.textContent = 'Requesting distance...';
          try {
            const resp = await fetch('/api/distance', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            const data = await resp.json();
            result.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            result.textContent = 'Error: ' + err;
          }
        }
      </script>
    </body>
    </html>
    """

    class Handler(BaseHTTPRequestHandler):
        def _send_json(self, payload, status=200):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in {"/", "/index.html"}:
                body = INDEX_HTML.encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            if self.path == "/api/status":
                self._send_json({"status": "ok", "valhalla": VALHALLA_URL, "nominatim": NOMINATIM_URL})
                return

            if self.path.startswith("/api/geocode"):
                query = self.path.split("?", 1)[1] if "?" in self.path else ""
                params = urllib.parse.parse_qs(query)
                q = params.get("q", [""])[0]
                if not q:
                    self._send_json({"error": "missing query"}, 400)
                    return
                try:
                    req = urllib.request.Request(f"{NOMINATIM_URL}/search?q={urllib.parse.quote(q)}&format=jsonv2&limit=1", headers={"User-Agent": "localosm-web"})
                    with urllib.request.urlopen(req, timeout=5) as response:
                        data = json.loads(response.read().decode("utf-8"))
                    self._send_json({"results": data})
                except Exception as exc:  # noqa: BLE001
                    self._send_json({"error": str(exc)}, 502)
                return

            self._send_json({"error": "not found"}, 404)

        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(content_length) if content_length else b"{}"
            try:
                payload = json.loads(body.decode("utf-8"))
            except Exception:
                self._send_json({"error": "invalid json"}, 400)
                return

            if self.path == "/api/route":
                self._forward_route(payload)
                return

            if self.path == "/api/distance":
                self._forward_distance(payload)
                return

            self._send_json({"error": "not found"}, 404)

        def _forward_route(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            costing = payload.get("costing", "auto")
            units = payload.get("units", "km")
            request_payload = {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": costing,
                "units": units,
            }
            try:
                req = urllib.request.Request(
                    f"{VALHALLA_URL}/route",
                    data=json.dumps(request_payload).encode("utf-8"),
                    headers={"Content-Type": "application/json", "User-Agent": "localosm-web"},
                    method="POST",
                )
                with urllib.request.urlopen(req, timeout=10) as response:
                    data = json.loads(response.read().decode("utf-8"))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "costing": costing,
                    "units": units,
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                    "trip": data.get("trip"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def _forward_distance(self, payload):
            start = payload.get("start", {})
            end = payload.get("end", {})
            costing = payload.get("costing", "auto")
            request_payload = {
                "locations": [
                    {"lat": start.get("lat"), "lon": start.get("lon")},
                    {"lat": end.get("lat"), "lon": end.get("lon")},
                ],
                "costing": costing,
                "units": payload.get("units", "km"),
            }
            try:
                req = urllib.request.Request(
                    f"{VALHALLA_URL}/route",
                    data=json.dumps(request_payload).encode("utf-8"),
                    headers={"Content-Type": "application/json", "User-Agent": "localosm-web"},
                    method="POST",
                )
                with urllib.request.urlopen(req, timeout=10) as response:
                    data = json.loads(response.read().decode("utf-8"))
                summary = data.get("trip", {}).get("summary", {})
                self._send_json({
                    "status": "ok",
                    "distance": summary.get("length"),
                    "time_seconds": summary.get("time"),
                })
            except Exception as exc:  # noqa: BLE001
                self._send_json({"error": str(exc)}, 502)

        def log_message(self, format, *args):
            return

    if __name__ == "__main__":
        server = HTTPServer((HOST, PORT), Handler)
        print(f"OSM web server listening on {HOST}:{PORT}")
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            pass
        finally:
            server.server_close()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: osm
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config/app.py /tmp/app.py
              python /tmp/app.py
          env:
            - name: STATUS_HOST
              value: "0.0.0.0"
            - name: STATUS_PORT
              value: "8080"
            - name: VALHALLA_URL
              value: "http://valhalla.osm.svc.cluster.local:8002"
            - name: NOMINATIM_URL
              value: "http://nominatim.osm.svc.cluster.local:8080"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-code
              mountPath: /config
      volumes:
        - name: app-code
          configMap:
            name: osm-web-app
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: osm
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084
