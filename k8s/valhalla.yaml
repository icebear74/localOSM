apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: osm
  labels:
    app: valhalla
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valhalla
  template:
    metadata:
      labels:
        app: valhalla
    spec:
      containers:
        - name: valhalla
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /data/tiles
              echo "Waiting for Valhalla tiles to be available..."
              while [ ! -f /data/valhalla_tiles.tar ] && [ -z "$(ls -A /data/tiles 2>/dev/null)" ]; do
                echo "No tiles found yet, retrying in 30s..."
                sleep 30
              done
              echo "Tiles found, starting valhalla_service..."
              exec valhalla_service /config/valhalla.json 1
          env:
            - name: PORT
              value: "8002"
          ports:
            - containerPort: 8002
          volumeMounts:
            - name: valhalla-data
              mountPath: /data
            - name: valhalla-config
              mountPath: /config
      volumes:
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla
            type: DirectoryOrCreate
        - name: valhalla-config
          configMap:
            name: osm-valhalla-config
---
apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: osm
spec:
  type: NodePort
  selector:
    app: valhalla
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30082
