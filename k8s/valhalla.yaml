apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: osm
  labels:
    app: valhalla
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valhalla
  template:
    metadata:
      labels:
        app: valhalla
    spec:
      initContainers:
        - name: wait-for-tiles
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -f /custom_files/valhalla_tiles.tar ]; do
                echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') Waiting for Valhalla tiles at /custom_files/valhalla_tiles.tar ..."
                sleep 30
              done
              echo "Tiles found — starting Valhalla service."
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      containers:
        - name: valhalla
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          command: ["/valhalla/scripts/run.sh", "build_tiles"]
          env:
            - name: use_tiles_ignore_pbf
              value: "True"
            - name: serve_tiles
              value: "True"
            - name: force_rebuild
              value: "False"
            - name: server_threads
              value: "6"
          resources:
            requests:
              memory: "4Gi"
              cpu: "4"
            limits:
              memory: "8Gi"
              cpu: "8"
          ports:
            - containerPort: 8002
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      volumes:
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla/active
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: osm
spec:
  type: NodePort
  selector:
    app: valhalla
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30082
