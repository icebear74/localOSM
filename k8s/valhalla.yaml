apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: osm
  labels:
    app: valhalla
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valhalla
  template:
    metadata:
      labels:
        app: valhalla
    spec:
      containers:
        - name: valhalla
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          env:
            # Use pre-built tiles if they exist, skip rebuilding from PBF
            - name: use_tiles_ignore_pbf
              value: "True"
            # Only serve tiles, do not attempt to rebuild
            - name: serve_tiles
              value: "True"
            - name: force_rebuild
              value: "False"
          ports:
            - containerPort: 8002
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      volumes:
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: osm
spec:
  type: NodePort
  selector:
    app: valhalla
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30082
