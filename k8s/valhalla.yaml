apiVersion: apps/v1
kind: Deployment
metadata:
  name: valhalla
  namespace: osm
  labels:
    app: valhalla
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valhalla
  template:
    metadata:
      labels:
        app: valhalla
    spec:
      initContainers:
        # Wait until the import job has built the tile archive before starting the service.
        # This prevents CrashLoopBackOff when no data is available yet.
        - name: wait-for-tiles
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -f /custom_files/valhalla_tiles.tar ]; do
                echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') Waiting for Valhalla tiles at /custom_files/valhalla_tiles.tar ..."
                sleep 30
              done
              echo "Tiles found — starting Valhalla service."
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      containers:
        - name: valhalla
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: Always
          command: ["/valhalla/scripts/run.sh", "build_tiles"]
          env:
            # Use the pre-built tile archive; skip rebuilding from any PBF in the folder
            - name: use_tiles_ignore_pbf
              value: "True"
            - name: serve_tiles
              value: "True"
            - name: force_rebuild
              value: "False"
            - name: server_threads
              value: "8"
          ports:
            - containerPort: 8002
          volumeMounts:
            - name: valhalla-data
              mountPath: /custom_files
      volumes:
        - name: valhalla-data
          hostPath:
            path: /mnt/data/OSM/valhalla
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: osm
spec:
  type: NodePort
  selector:
    app: valhalla
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      nodePort: 30082
