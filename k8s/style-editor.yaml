apiVersion: apps/v1
kind: Deployment
metadata:
  name: style-editor
  namespace: osm
  labels:
    app: style-editor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: style-editor
  template:
    metadata:
      labels:
        app: style-editor
    spec:
      containers:
        - name: maputnik
          image: maputnik/editor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: style-editor
  namespace: osm
spec:
  type: NodePort
  selector:
    app: style-editor
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      nodePort: 30086
