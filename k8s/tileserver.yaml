apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver-gl
  namespace: osm
  labels:
    app: tileserver-gl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tileserver-gl
  template:
    metadata:
      labels:
        app: tileserver-gl
    spec:
      initContainers:
        # Create a minimal config.json so tileserver-gl does not exit immediately
        # when no MBTiles files have been downloaded yet. All font downloads have
        # already been completed by scripts/setup-osm.sh during deployment setup.
        - name: init-config
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
             # Verify fonts directory structure exists (fonts were pre-downloaded by setup-osm.sh)
             mkdir -p /data/fonts/NotoSansRegular || {
               echo "[ERROR] Failed to create fonts directory"
               exit 1
             }

             # Migrate old font directory name (spaces cause HTTP 400 in TileServer-GL).
             if [ -d "/data/fonts/Noto Sans Regular" ] && [ ! -d "/data/fonts/NotoSansRegular" ]; then
               mv "/data/fonts/Noto Sans Regular" "/data/fonts/NotoSansRegular"
               echo "[INFO] Migrated font directory: 'Noto Sans Regular' -> 'NotoSansRegular'"
             fi

             # Check if fonts are available
             FONT_COUNT=$(find /data/fonts/NotoSansRegular -type f \( -name "*.ttf" -o -name "*.otf" \) 2>/dev/null | wc -l)
             if [ "$FONT_COUNT" -gt 0 ]; then
               echo "[✓] Fonts verified: $FONT_COUNT font files found"
             else
               echo "[!] WARNING: No fonts found. Map will render WITHOUT text labels."
               echo "[!] Fonts should have been downloaded by scripts/setup-osm.sh"
             fi

             if [ -f /data/map.mbtiles ]; then
               # Write full config with data
               printf '%s\n' '{"options":{"paths":{"root":"/","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{"osm":{"style":"/data/style.json"}},"data":{"v3":{"mbtiles":"/data/map.mbtiles"}}}' > /data/config.json
               # Write default MapLibre GL style only on first start.
               # After the first tile build the status service writes style.json with
               # the geographic centre of all downloaded regions, so we must not
               # overwrite it on subsequent pod restarts.
               if [ ! -f /data/style.json ]; then
                 printf '%s\n' '{"version":8,"name":"LocalOSM","sources":{"openmaptiles":{"type":"vector","url":"mbtiles://{v3}"}},"glyphs":"/fonts/{fontstack}/{range}.pbf","layers":[{"id":"background","type":"background","paint":{"background-color":"#f2efe9"}},{"id":"landcover-wood","type":"fill","source":"openmaptiles","source-layer":"landcover","filter":["in","class","wood","forest"],"paint":{"fill-color":"#d0e8c0","fill-opacity":0.6}},{"id":"landcover-grass","type":"fill","source":"openmaptiles","source-layer":"landcover","filter":["in","class","grass","farmland","agriculture"],"paint":{"fill-color":"#e8f0d0","fill-opacity":0.5}},{"id":"landuse-residential","type":"fill","source":"openmaptiles","source-layer":"landuse","filter":["in","class","residential","commercial","industrial"],"paint":{"fill-color":"#e8e0d8","fill-opacity":0.5}},{"id":"landuse-green","type":"fill","source":"openmaptiles","source-layer":"landuse","filter":["in","class","grass","park","meadow","forest","wood","cemetery"],"paint":{"fill-color":"#d0e8c0"}},{"id":"water","type":"fill","source":"openmaptiles","source-layer":"water","paint":{"fill-color":"#9cc0d4"}},{"id":"waterway","type":"line","source":"openmaptiles","source-layer":"waterway","paint":{"line-color":"#9cc0d4","line-width":1}},{"id":"boundary-country","type":"line","source":"openmaptiles","source-layer":"boundary","filter":["==","admin_level",2],"paint":{"line-color":"#9e9cab","line-width":{"stops":[[2,0.5],[6,1.5],[10,2]]}}},{"id":"boundary-state","type":"line","source":"openmaptiles","source-layer":"boundary","filter":["==","admin_level",4],"minzoom":4,"paint":{"line-color":"#b0adb8","line-width":0.8,"line-dasharray":[3,2]}},{"id":"road","type":"line","source":"openmaptiles","source-layer":"transportation","filter":["in","class","minor","service","track","path"],"minzoom":12,"paint":{"line-color":"#d4cfc8","line-width":{"stops":[[12,0.5],[14,1],[16,3]]}}},{"id":"road-secondary","type":"line","source":"openmaptiles","source-layer":"transportation","filter":["in","class","secondary","tertiary"],"minzoom":9,"paint":{"line-color":"#c8c3ba","line-width":{"stops":[[9,0.5],[12,1.5],[14,3],[16,5]]}}},{"id":"road-primary","type":"line","source":"openmaptiles","source-layer":"transportation","filter":["==","class","primary"],"minzoom":7,"paint":{"line-color":"#fcd354","line-width":{"stops":[[7,0.5],[10,2],[14,5],[16,8]]}}},{"id":"road-major","type":"line","source":"openmaptiles","source-layer":"transportation","filter":["in","class","motorway","trunk"],"paint":{"line-color":"#f9a825","line-width":{"stops":[[6,1],[10,3],[14,7],[16,12]]}}},{"id":"building","type":"fill","source":"openmaptiles","source-layer":"building","minzoom":14,"paint":{"fill-color":"#d9d0c9","fill-opacity":0.9}},{"id":"water-name","type":"symbol","source":"openmaptiles","source-layer":"water_name","layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[4,10],[10,14]]},"symbol-placement":"point"},"paint":{"text-color":"#5b8db8","text-halo-color":"#fff","text-halo-width":1}},{"id":"road-label-minor","type":"symbol","source":"openmaptiles","source-layer":"transportation_name","filter":["in","class","minor","service","track"],"minzoom":15,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"symbol-placement":"line","text-size":10,"text-max-angle":30,"text-padding":5},"paint":{"text-color":"#555","text-halo-color":"#fff","text-halo-width":1.5}},{"id":"road-label-secondary","type":"symbol","source":"openmaptiles","source-layer":"transportation_name","filter":["in","class","secondary","tertiary"],"minzoom":13,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"symbol-placement":"line","text-size":11,"text-max-angle":30},"paint":{"text-color":"#555","text-halo-color":"#fff","text-halo-width":1.5}},{"id":"road-label-primary","type":"symbol","source":"openmaptiles","source-layer":"transportation_name","filter":["in","class","primary","trunk","motorway"],"minzoom":10,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"symbol-placement":"line","text-size":12,"text-max-angle":30},"paint":{"text-color":"#333","text-halo-color":"#fff","text-halo-width":1.5}},{"id":"place-country","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["==","class","country"],"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[2,10],[6,16],[8,18]]}},"paint":{"text-color":"#333","text-halo-color":"rgba(255,255,255,0.8)","text-halo-width":2}},{"id":"place-state","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["==","class","state"],"minzoom":5,"maxzoom":12,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[5,10],[10,14]]}},"paint":{"text-color":"#555","text-halo-color":"rgba(255,255,255,0.8)","text-halo-width":1.5}},{"id":"place-city","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["in","class","city"],"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[6,11],[10,15],[14,18]]}},"paint":{"text-color":"#222","text-halo-color":"rgba(255,255,255,0.9)","text-halo-width":2}},{"id":"place-town","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["==","class","town"],"minzoom":8,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[8,10],[12,14],[16,17]]}},"paint":{"text-color":"#333","text-halo-color":"rgba(255,255,255,0.9)","text-halo-width":1.5}},{"id":"place-village","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["==","class","village"],"minzoom":10,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":{"stops":[[10,10],[14,13]]}},"paint":{"text-color":"#444","text-halo-color":"rgba(255,255,255,0.9)","text-halo-width":1.5}},{"id":"place-suburb","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["in","class","suburb","quarter","neighbourhood"],"minzoom":12,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":11},"paint":{"text-color":"#555","text-halo-color":"rgba(255,255,255,0.9)","text-halo-width":1.5}},{"id":"place-hamlet","type":"symbol","source":"openmaptiles","source-layer":"place","filter":["in","class","hamlet","isolated_dwelling"],"minzoom":13,"layout":{"text-field":["coalesce",["get","name:de"],["get","name:en"],["get","name"]],"text-font":["NotoSansRegular"],"text-size":10},"paint":{"text-color":"#666","text-halo-color":"rgba(255,255,255,0.9)","text-halo-width":1.5}}]}' > /data/style.json
                 echo "[INFO] TileServer: default style.json written"
               else
                 echo "[INFO] TileServer: using existing style.json (set by status service)"
               fi
               echo "[INFO] TileServer configured with local map.mbtiles"
             else
               # Write minimal empty config (no data yet)
               printf '{"options":{"paths":{"root":"","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{},"data":{}}\n' > /data/config.json
               echo "[INFO] TileServer started without tiles (no map.mbtiles found)"
             fi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
      containers:
        - name: tileserver-gl
          image: maptiler/tileserver-gl:latest
          imagePullPolicy: Always
          args: ["/data/config.json"]
          env:
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
      volumes:
        - name: tileserver-data
          hostPath:
            path: /mnt/data/OSM/tileserver
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: tileserver-gl
  namespace: osm
spec:
  type: NodePort
  selector:
    app: tileserver-gl
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30085
