apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver-gl
  namespace: osm
  labels:
    app: tileserver-gl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tileserver-gl
  template:
    metadata:
      labels:
        app: tileserver-gl
    spec:
      initContainers:
        # Create a minimal config.json so tileserver-gl does not exit immediately
        # when no MBTiles files have been downloaded yet.
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -f /data/config.json ]; then
                printf '{"options":{"paths":{"root":"","fonts":"/usr/share/fonts","sprites":"","icons":""},"serveAllFonts":true},"styles":{},"data":{}}\n' \
                  > /data/config.json
                echo "Created minimal tileserver-gl config.json"
              else
                echo "config.json already present — keeping existing file"
              fi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
      containers:
        - name: tileserver-gl
          image: maptiler/tileserver-gl:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
      volumes:
        - name: tileserver-data
          hostPath:
            path: /mnt/data/OSM/tileserver
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: tileserver-gl
  namespace: osm
spec:
  type: NodePort
  selector:
    app: tileserver-gl
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30085
