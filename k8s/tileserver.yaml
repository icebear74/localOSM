apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver-gl
  namespace: osm
  labels:
    app: tileserver-gl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tileserver-gl
  template:
    metadata:
      labels:
        app: tileserver-gl
    spec:
      initContainers:
        - name: init-config
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /data/fonts/NotoSansRegular || {
                echo "[ERROR] Failed to create fonts directory"
                exit 1
              }

              copy_font_stack() {
                local source_name="$1"
                local target_name="$2"
                local source_dir="/fonts-source/${source_name}"
                local target_dir="/data/fonts/${target_name}"
                if [ ! -d "${source_dir}" ]; then
                  return 0
                fi
                rm -rf "${target_dir}"
                mkdir -p "${target_dir}"
                cp -a "${source_dir}/." "${target_dir}/"
                echo "[INFO] Installed font stack '${target_name}' from '${source_name}'"
              }

              copy_font_stack "KlokanTech Noto Sans Regular" "NotoSansRegular"
              copy_font_stack "KlokanTech Noto Sans Bold" "NotoSansBold"
              copy_font_stack "KlokanTech Noto Sans Italic" "NotoSansItalic"
              copy_font_stack "KlokanTech Noto Sans CJK Regular" "NotoSansCJKRegular"
              copy_font_stack "KlokanTech Noto Sans CJK Bold" "NotoSansCJKBold"

              EXPECTED_STACKS="NotoSansRegular NotoSansBold NotoSansItalic NotoSansCJKRegular NotoSansCJKBold"
              for stack in $EXPECTED_STACKS; do
                if [ ! -d "/data/fonts/$stack" ]; then
                  echo "[!] WARNING: Missing expected font stack directory /data/fonts/$stack"
                fi
              done

              FONT_COUNT=$(find /data/fonts -mindepth 1 -type f \( -name "*.pbf" -o -name "*.ttf" -o -name "*.otf" \) 2>/dev/null | wc -l)
              if [ "$FONT_COUNT" -gt 0 ]; then
                echo "[✓] Fonts verified: $FONT_COUNT glyph files available"
              else
                echo "[!] WARNING: No glyph files found. Map will render WITHOUT text labels."
              fi

              if [ -f /style-source/style.json ] && [ ! -f /data/style.json ]; then
                cp /style-source/style.json /data/style.json
                echo "[INFO] TileServer: installed style.json from ConfigMap tileserver-style"
              fi

              if [ -f /data/map.mbtiles ]; then
                printf '%s\n' '{"options":{"paths":{"root":"/","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{"osm":{"style":"/data/style.json"}},"data":{"v3":{"mbtiles":"/data/map.mbtiles"}}}' > /data/config.json
                if [ ! -f /data/style.json ]; then
                  printf '%s\n' '{"version":8,"name":"LocalOSM","sources":{"openmaptiles":{"type":"vector","url":"mbtiles://{v3}"}},"glyphs":"{fontstack}/{range}.pbf","layers":[{"id":"background","type":"background","paint":{"background-color":"#f2efe9"}}]}' > /data/style.json
                fi
              else
                printf '{"options":{"paths":{"root":"","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{},"data":{}}\n' > /data/config.json
              fi
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
            - name: tileserver-fonts
              mountPath: /fonts-source
              readOnly: true
            - name: tileserver-style
              mountPath: /style-source
              readOnly: true
      containers:
        - name: tileserver-gl
          image: maptiler/tileserver-gl:latest
          imagePullPolicy: Always
          args: ["/data/config.json"]
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          env:
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: tileserver-data
          hostPath:
            path: /mnt/data/OSM/tileserver/active
            type: DirectoryOrCreate
        - name: tileserver-style
          configMap:
            name: tileserver-style
            optional: true
        - name: tileserver-fonts
          hostPath:
            path: /mnt/data/OSM/tileserver/fonts
            type: DirectoryOrCreate
        # TileServer-GL renders raster tiles server-side via MapLibre GL Native's
        # headless GL backend, which needs shared memory to allocate its GL
        # context/framebuffers. Kubernetes containers default to a tiny 64Mi
        # /dev/shm, which is enough for vector (.pbf) tile serving (no rendering
        # involved) but too small for raster rendering, causing raster tiles to
        # fail/return blank while vector tiles keep working fine.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tileserver-gl
  namespace: osm
spec:
  type: NodePort
  selector:
    app: tileserver-gl
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30085
