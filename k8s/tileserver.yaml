apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver-gl
  namespace: osm
  labels:
    app: tileserver-gl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tileserver-gl
  template:
    metadata:
      labels:
        app: tileserver-gl
    spec:
      initContainers:
        - name: init-config
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /data/fonts/NotoSansRegular || {
                echo "[ERROR] Failed to create fonts directory"
                exit 1
              }

              if [ -d "/data/fonts/Noto Sans Regular" ] && [ ! -d "/data/fonts/NotoSansRegular" ]; then
                mv "/data/fonts/Noto Sans Regular" "/data/fonts/NotoSansRegular"
                echo "[INFO] Migrated font directory: 'Noto Sans Regular' -> 'NotoSansRegular'"
              fi

              FONT_COUNT=$(find /data/fonts/NotoSansRegular -type f \( -name "*.ttf" -o -name "*.otf" \) 2>/dev/null | wc -l)
              if [ "$FONT_COUNT" -gt 0 ]; then
                echo "[✓] Fonts verified: $FONT_COUNT font files found"
              else
                echo "[!] WARNING: No fonts found. Map will render WITHOUT text labels."
              fi

              if [ -f /style-source/style.json ] && [ ! -f /data/style.json ]; then
                cp /style-source/style.json /data/style.json
                echo "[INFO] TileServer: installed style.json from ConfigMap tileserver-style"
              fi

              if [ -f /data/map.mbtiles ]; then
                printf '%s\n' '{"options":{"paths":{"root":"/","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{"osm":{"style":"/data/style.json"}},"data":{"v3":{"mbtiles":"/data/map.mbtiles"}}}' > /data/config.json
                if [ ! -f /data/style.json ]; then
                  printf '%s\n' '{"version":8,"name":"LocalOSM","sources":{"openmaptiles":{"type":"vector","url":"mbtiles://{v3}"}},"glyphs":"/fonts/{fontstack}/{range}.pbf","layers":[{"id":"background","type":"background","paint":{"background-color":"#f2efe9"}}]}' > /data/style.json
                fi
              else
                printf '{"options":{"paths":{"root":"","fonts":"/data/fonts","sprites":"","icons":""},"serveAllFonts":true,"cors":true},"styles":{},"data":{}}\n' > /data/config.json
              fi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
            - name: tileserver-style
              mountPath: /style-source
              readOnly: true
      containers:
        - name: tileserver-gl
          image: maptiler/tileserver-gl:latest
          imagePullPolicy: Always
          args: ["/data/config.json"]
          env:
            - name: PORT
              value: "80"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: tileserver-data
          hostPath:
            path: /mnt/data/OSM/tileserver/active
            type: DirectoryOrCreate
        - name: tileserver-style
          configMap:
            name: tileserver-style
            optional: true
        # TileServer-GL renders raster tiles server-side via MapLibre GL Native's
        # headless GL backend, which needs shared memory to allocate its GL
        # context/framebuffers. Kubernetes containers default to a tiny 64Mi
        # /dev/shm, which is enough for vector (.pbf) tile serving (no rendering
        # involved) but too small for raster rendering, causing raster tiles to
        # fail/return blank while vector tiles keep working fine.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tileserver-gl
  namespace: osm
spec:
  type: NodePort
  selector:
    app: tileserver-gl
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30085
